<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Upload Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>📄 Invoice Upload Tool</h1>
    <p class="sub">Upload a PDF invoice, review the extracted data, and save it to Airtable.</p>

    <!-- Step 1: choose + process -->
    <section class="upload">
      <input type="file" id="fileInput" accept="application/pdf" />
      <button id="processBtn">Process Invoice</button>
    </section>

    <p id="status" class="status hidden"></p>

    <!-- Step 2: review extracted data (hidden until processing succeeds) -->
    <section id="results" class="results hidden">
      <h2>Review &amp; edit</h2>
      <p id="confidence" class="confidence"></p>

      <label>Invoice Number <input type="text" id="invoice_number" /></label>
      <label>Vendor <input type="text" id="vendor" /></label>
      <label>Invoice Date <input type="text" id="invoice_date" placeholder="YYYY-MM-DD" /></label>
      <label>Due Date <input type="text" id="due_date" placeholder="YYYY-MM-DD" /></label>
      <label>Amount <input type="number" step="0.01" id="amount" /></label>

      <button id="saveBtn">Save to Airtable</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
